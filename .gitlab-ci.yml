workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'schedule' && $CI_COMMIT_REF_NAME == 'main' && $SYNC_WINDOWS_UPDATES == 'true'
    - if: $CI_PIPELINE_SOURCE == 'schedule' && $CI_COMMIT_REF_NAME == 'main'
    - if: $CI_PIPELINE_SOURCE == 'push' && ($CI_COMMIT_REF_NAME == 'main' || $CI_COMMIT_REF_NAME == 'dev')
    - when: never

stages:
  - check
  - build
  - sync

include:
  - local: '.gitlab/ci/packer-build.yml'

# Keeps the static build matrix below honest: fails the pipeline if a
# build directory has been added to (or removed from) vsphere/ without
# the run_builds matrix being updated to match, rather than silently
# ignoring it.
check_build_matrix:
  stage: check
  image: mpoore/packer-ci:latest
  rules:
    - if: $SYNC_WINDOWS_UPDATES != 'true'
  script:
    - .gitlab/ci/check-build-matrix.sh

# The list of packer builds. Deliberately static rather than
# auto-discovered at pipeline run time: this list doesn't change often,
# and a new build should be a deliberate, reviewable addition here, not
# something a schedule silently starts building the moment a new
# directory appears. check_build_matrix (above) fails the pipeline if
# this list and the vsphere/ tree ever drift apart.
run_builds:
  stage: build
  extends: .packer_build
  rules:
    - if: $SYNC_WINDOWS_UPDATES != 'true'
  parallel:
    matrix:
      - BUILD:
          - vsphere/esx/esx8
          - vsphere/linux/centos9
          - vsphere/linux/centos10
          - vsphere/linux/photon5
          - vsphere/linux/rhel9
          - vsphere/linux/rhel10
          - vsphere/linux/rocky9
          - vsphere/linux/rocky10
          - vsphere/linux/ubuntu2204
          - vsphere/linux/ubuntu2404
          - vsphere/linux/ubuntu2604
          - vsphere/windows/win2019
          - vsphere/windows/win2022
          - vsphere/windows/win2025
  before_script:
    - .gitlab/ci/changed.sh "$BUILD" || exit 0
    - !reference [.packer_build, before_script]

# Syncs the offline Windows Update repository (scripts/winupdate-sync/) on
# its own schedule, separate from the packer build schedule. Triggered by a
# dedicated GitLab Pipeline Schedule with SYNC_WINDOWS_UPDATES=true set.
sync_windows_updates:
  stage: sync
  image: mcr.microsoft.com/powershell:latest
  rules:
    - if: $SYNC_WINDOWS_UPDATES == 'true'
  before_script:
    - apt-get update -qq && apt-get install -y -qq rsync openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$winupdate_ssh_private_key" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
    - echo "$winupdate_ssh_known_hosts" > ~/.ssh/known_hosts
  script:
    - pwsh -File scripts/winupdate-sync/sync.ps1
  variables:
    WINUPDATE_REPO_HOST: $winupdate_repo_host
    WINUPDATE_REPO_USER: $winupdate_repo_user
    WINUPDATE_REPO_PATH: $winupdate_repo_path
    # TEMPORARY: diagnosing the rsync "Permission denied" failures. Remove once resolved.
    WINUPDATE_SSH_DEBUG: "true"
